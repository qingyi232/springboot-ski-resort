# Redis配置
spring:
  redis:
    # Redis服务器地址
    host: localhost
    # Redis服务器端口
    port: 6379
    # Redis数据库索引（默认为0）
    database: 0
    # Redis密码（如果没有密码，请留空或注释掉此行）
    # password: your-redis-password
    # 连接超时时间（毫秒）
    timeout: 5000
    # 连接池配置
    lettuce:
      pool:
        # 连接池最大连接数（负值表示没有限制）
        max-active: 8
        # 连接池最大阻塞等待时间（负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池中的最小空闲连接
        min-idle: 0
    # 键的默认过期时间（秒）
    default-expiration: 3600







